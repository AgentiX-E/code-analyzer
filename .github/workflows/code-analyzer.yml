name: 'Code Analyzer PR Review'

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to analyze'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Skip for draft PRs and only run on approved review submissions
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request_review' || github.event.review.state == 'approved')
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/code-analyzer-action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  summary:
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    steps:
      - name: Check Analysis Status
        run: |
          if [ "${{ needs.analyze.result }}" == "success" ]; then
            echo "✅ Code Analyzer review passed"
          elif [ "${{ needs.analyze.result }}" == "failure" ]; then
            echo "❌ Code Analyzer found issues"
            exit 1
          else
            echo "⚠️  Code Analyzer review was skipped or cancelled"
          fi
